name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install transformers accelerate
        pip install -e "."
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=hllm --cov-report=xml --cov-report=term -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  coverage-badge:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install transformers accelerate
        pip install -e "."
        pip install pytest pytest-cov

    - name: Generate coverage report
      run: |
        pytest tests/ --cov=hllm --cov-report=term | tee coverage.txt
        echo "COVERAGE=$(grep 'TOTAL' coverage.txt | awk '{print $4}' | sed 's/%//')" >> $GITHUB_ENV

    - name: Update README badge
      run: |
        COVERAGE=${{ env.COVERAGE }}
        echo "Coverage: ${COVERAGE}%"
        
        # 确定颜色
        if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
          COLOR="brightgreen"
        elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
          COLOR="green"
        elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
          COLOR="yellow"
        else
          COLOR="red"
        fi
        
        # 更新 README 中的徽章
        sed -i "s|https://img.shields.io/badge/coverage-[0-9]*%-[a-z]*|https://img.shields.io/badge/coverage-${COVERAGE}%-${COLOR}|g" README.md
        
        # 如果没有徽章，添加一个
        if ! grep -q "coverage" README.md; then
          sed -i "1a\[![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%-${COLOR})](docs/coverage_report.md)" README.md
        fi

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        if ! git diff --staged --quiet; then
          git commit -m "docs: update coverage badge to ${COVERAGE}% [skip ci]"
          git push
        fi
